<html>

    <head>
        <title>Mera Card</title>
        <style>
            @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        </style>
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <style>
            * {
                margin: 0px;
                padding: 0px;
                box-sizing: border-box;
            }

            body {
                /* background: rgb(201, 201, 7); */
                background-image: url(https://external-content.duckduckgo.com/iu/?u=https%3A%2F%2Ftse1.mm.bing.net%2Fth%2Fid%2FOIP.6ZiuuotlOP2tiEmve7750gHaEK%3Fpid%3DApi&f=1&ipt=bca94038b71bd23db6f166610a5aeb851b38c4bcd5bd3abd4b47240a679e857b&ipo=images);
                background-repeat: no-repeat;
                background-size: cover;
                width: 100vw;
                height: 100vh;
                display: grid;
                place-content: center;
            }

            div {
                background-color: rgb(69, 64, 64);
                width: 400px;
                border-radius: 20px;
                text-align: center;
            }

            img {
                width: 400px;
                border-top-left-radius: 20px;
                border-top-right-radius: 20px;
            }

            a {
                font-size: 40px;
                background-color: yellow;
                display: block;
                margin: 10px;
                padding: 10px;
                border-radius: 15px;
                text-decoration: none;
                color: rgb(255, 89, 252);
                font-family: "Poppins", sans-serif;
                font-weight: 400;
                font-style: normal;
                
            }
            .icon{
                height: 50px;
                width: 50px;
                position: relative;
                right: 150px;
                top: 80px;
                color: yellow;
                border-radius:18px;
            }
        </style>
    </head>

    <body>
        <div>
            <img src="chitra.png" alt="Dhoni Bhaiya">
            <img src="image.png" alt="" class="icon">
            <a href="https://instagram.com/mahi7781"> @mahi7781 </a>
        </div>
    </body>

</html>
